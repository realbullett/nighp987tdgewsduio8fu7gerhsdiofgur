<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night | Secure Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background-color: #020617; /* Deep Night Blue */
        color: #e2e8f0;
        overflow: hidden;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #4c1d95; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6d28d9; 
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .animate-in.fade-in.slide-in-from-bottom-2 {
        animation: fade-in-up 0.4s ease-out forwards;
      }

      /* Twinkling Stars */
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      .star-twinkle {
        animation: twinkle 3s infinite ease-in-out;
      }

      /* New Animations */
      @keyframes slide-out-right {
        0% { opacity: 1; transform: translateX(0); }
        100% { opacity: 0; transform: translateX(30px); }
      }
      .slide-out {
        animation: slide-out-right 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        pointer-events: none;
      }

      @keyframes scale-in-spring {
        0% { opacity: 0; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 1; transform: scale(1); }
      }
      .zoom-in-spring {
        animation: scale-in-spring 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes pulse-success {
        0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }
      .animate-pulse-success {
        animation: pulse-success 1s infinite;
      }
    </style>

{

  }
}
</script>

</head>
